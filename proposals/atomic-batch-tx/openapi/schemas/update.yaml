---
allOf:
- $ref: 'description.yaml'
- type: object
  required:
  - action
  - collection
  - properties
  properties:
    action:
      type: string
      const: 'update'
    collection:
      type: string
    properties:
      type: object
      properties:
        add:
          type: array
          items:
            $ref: 'nameValuePair.yaml'
        modify:
          type: array
          items:
            $ref: 'nameValuePair.yaml'
        delete:
          type: array
          items:
            type: string
    filter:
      oneOf:
      - type: string
      - $ref: 'cql2.yaml'
    filter-lang:
      type: string
      default: 'cql2-json'
    filter-crs:
      type: string
      default: 'http://www.opengis.net/def/crs/OGC/1.3/CRS84'
