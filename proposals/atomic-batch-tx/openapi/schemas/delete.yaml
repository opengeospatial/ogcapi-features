---
allOf:
- $ref: 'description.yaml'
- type: object
  required:
  - action
  - collection
  properties:
    action:
      type: string
      const: 'delete'
    collection:
      type: string
    filter:
      oneOf:
      - type: string
      - $ref: 'cql2.yaml'
    filter-lang:
      type: string
      default: 'cql2-json'
    filter-crs:
      type: string
      default: 'http://www.opengis.net/def/crs/OGC/1.3/CRS84'
