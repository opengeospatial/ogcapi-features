---
allOf:
- $ref: 'description.yaml'
- type: object
  required:
  - action
  - collection
  - properties
  properties:
    action:
      type: string
      const: 'replace'
    collection:
      type: string
    properties:
      type: object
      properties:
        feature:
          oneOf:
          - $ref: 'https://schemas.opengis.net/ogcapi/features/part1/1.0/openapi/schemas/featureGeoJSON.yaml'
          - $ref: 'link.yaml'
    filter:
      oneOf:
      - type: string
      - $ref: 'cql2.yaml'
    filter-lang:
      type: string
      default: 'cql2-json'
    filter-crs:
      type: string
      default: 'http://www.opengis.net/def/crs/OGC/1.3/CRS84'
