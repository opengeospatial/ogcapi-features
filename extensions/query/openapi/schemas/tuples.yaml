---
allOf:
  - $ref: links.yaml
  - type: object
    required:
      - type
      - tuples
    properties:
      type:
        type: string
        const: TupleCollection
      tuples:
        type: array
        items:
          $ref: tuple.yaml
      timeStamp:
        type: string
        format: date-time
      numberMatched:
        type: integer
        minimum: 0
      numberReturned:
        type: integer
        minimum: 0
